<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Сборник Игр</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; color: white; }
        #menu { padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100%; overflow-y: auto; }
        #gamesGrid { display: flex; gap: 15px; width: 100%; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .game-card { width: 120px; text-align: center; cursor: pointer; background: #333; padding: 10px; border-radius: 8px; transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.05); }
        .game-card img { width: 100px; height: 100px; border-radius: 8px; object-fit: cover; background: #555; }
        .game-card p { margin: 8px 0 0 0; font-size: 14px; }
        #gameContainer { width: 100%; height: 100%; display: none; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #backButton { position: absolute; top: 10px; left: 10px; padding: 10px 15px; background: #ff3b30; color: white; border: none; cursor: pointer; border-radius: 5px; z-index: 10; font-weight: bold; }
        .error-msg { color: #ff6b6b; margin-top: 20px; }
    </style>
    <script src="https://yandex.ru/games/sdk/v2/"></script>
</head>
<body>

    <!-- Меню -->
    <div id="menu">
        <h2>Выберите игру:</h2>
        <div id="gamesGrid"></div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <!-- Игровой контейнер -->
    <div id="gameContainer">
        <button id="backButton" onclick="backToMenu()">⬅ В меню</button>
        <iframe id="gameFrame" src="" allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        // Конфигурация
        const GITHUB_USERNAME = "DanilFi";
        const REPOSITORY_NAME = "cool_games";

        // ВСТРОЕННЫЙ СПИСОК ИГР (никаких fetch запросов)
        const GAMES = [
            {
                id: "game_ferms",
                title: "Ферма-кликер",
                icon: "icon.png"   // файл иконки лежит в папке game_ferms/
            }
            // Добавляйте сюда новые игры
        ];

        let ysdk = null;
        let player = null;

        // Инициализация SDK
        YaGames.init().then(_ysdk => {
            ysdk = _ysdk;
            console.log("Яндекс SDK инициализирован");
            return ysdk.getPlayer({ scopes: false });
        }).then(_player => {
            player = _player;
            console.log("Игрок получен");
        }).catch(err => {
            console.warn("SDK не инициализирован:", err);
        });

        // Отображение игр
        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            if (!GAMES.length) {
                document.getElementById('errorMsg').textContent = 'Список игр пуст. Добавьте игры в код.';
                return;
            }
            GAMES.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                // Путь к иконке
                const iconSrc = `https://${GITHUB_USERNAME}.github.io/${REPOSITORY_NAME}/${game.id}/${game.icon}`;
                card.innerHTML = `
                    <img src="${iconSrc}" alt="${game.title}" 
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23555%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2250%22 font-size=%2240%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23fff%22%3E🎮%3C/text%3E%3C/svg%3E'">
                    <p>${game.title}</p>
                `;
                card.onclick = () => launchGame(game.id);
                grid.appendChild(card);
            });
        }

        // Запуск игры (используем game.html вместо index.html)
        function launchGame(gameId) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            const frame = document.getElementById('gameFrame');
            // ВАЖНО: файл игры теперь game.html
            frame.src = `https://${GITHUB_USERNAME}.github.io/${REPOSITORY_NAME}/${gameId}/game.html?gameId=${gameId}`;
        }

        // Возврат в меню
        function backToMenu() {
            const frame = document.getElementById('gameFrame');
            frame.src = '';
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
        }

        // Обработка сообщений от игр (реклама, сохранения)
        window.addEventListener('message', function(event) {
            const frame = document.getElementById('gameFrame');
            if (!frame || !frame.contentWindow) return;
            const data = event.data;
            if (!data || typeof data !== 'object') return;

            if (data.type === 'SHOW_REKLAMA' && ysdk) {
                ysdk.adv.showFullscreenAdv({
                    callbacks: {
                        onClose: () => frame.contentWindow.postMessage({ type: 'AD_CLOSED' }, '*'),
                        onError: () => frame.contentWindow.postMessage({ type: 'AD_CLOSED' }, '*')
                    }
                });
                return;
            }

            if (data.type === 'YANDEX_SAVE' && player) {
                const key = `save_${data.gameId}`;
                player.setData({ [key]: data.payload }).catch(console.warn);
                return;
            }

            if (data.type === 'YANDEX_LOAD' && player) {
                const key = `save_${data.gameId}`;
                player.getData([key]).then(result => {
                    frame.contentWindow.postMessage({
                        type: 'YANDEX_LOAD_SUCCESS',
                        gameId: data.gameId,
                        data: result[key] || null
                    }, '*');
                }).catch(() => {
                    frame.contentWindow.postMessage({
                        type: 'YANDEX_LOAD_SUCCESS',
                        gameId: data.gameId,
                        data: null
                    }, '*');
                });
                return;
            }
        });

        // Запускаем отображение
        renderGames();
        console.log('Лаунчер загружен, количество игр:', GAMES.length);
    </script>
</body>
</html>
