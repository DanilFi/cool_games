<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Тест</title></head>
<body>
    <h2>Выберите игру:</h2>
    <div id="gamesGrid"></div>
    <script>
        alert('Скрипт выполняется!');
        const GAMES = [{ id: "game_ferms", title: "Ферма-кликер", icon: "icon.png" }];
        const grid = document.getElementById('gamesGrid');
        GAMES.forEach(game => {
            const card = document.createElement('div');
            card.textContent = game.title;
            card.style.padding = '20px';
            card.style.background = '#333';
            card.style.margin = '10px';
            grid.appendChild(card);
        });
        document.body.innerHTML += '<p>Карточки добавлены</p>';
    </script>
</body>
</html>
